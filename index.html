<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria — Voice Concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14161B;
    --ink-2:#1C2027;
    --paper:#F5F3EE;
    --amber:#E8A33D;
    --teal:#1F3A3D;
    --slate:#8A93A0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(232,163,61,0.10), transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(31,58,61,0.35), transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  header{
    width:100%;
    max-width:880px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:32px 24px 0;
    z-index:1;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--slate);
  }
  .brand .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 10px rgba(232,163,61,0.7);
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--slate);
  }

  main{
    flex:1;
    width:100%;
    max-width:720px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 24px 40px;
    z-index:1;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(2.6rem, 7vw, 4.2rem);
    line-height:1.05;
    letter-spacing:-0.01em;
    margin-bottom:18px;
  }
  h1 em{
    font-style:italic;
    font-weight:300;
    color:var(--amber);
  }
  p.lede{
    font-size:1.05rem;
    line-height:1.6;
    color:#C9CBD1;
    max-width:480px;
    margin-bottom:48px;
  }

  /* Signature element: idle waveform */
  .waveform{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    height:64px;
    margin-bottom:44px;
  }
  .waveform span{
    display:block;
    width:4px;
    border-radius:3px;
    background:linear-gradient(180deg, var(--amber), var(--teal));
    animation: breathe 2.6s ease-in-out infinite;
  }
  .waveform span:nth-child(1){height:18px; animation-delay:0s;}
  .waveform span:nth-child(2){height:34px; animation-delay:0.15s;}
  .waveform span:nth-child(3){height:52px; animation-delay:0.3s;}
  .waveform span:nth-child(4){height:28px; animation-delay:0.45s;}
  .waveform span:nth-child(5){height:44px; animation-delay:0.6s;}
  .waveform span:nth-child(6){height:20px; animation-delay:0.75s;}
  .waveform span:nth-child(7){height:38px; animation-delay:0.9s;}
  @keyframes breathe{
    0%,100%{transform:scaleY(0.7); opacity:0.6;}
    50%{transform:scaleY(1); opacity:1;}
  }
  @media (prefers-reduced-motion: reduce){
    .waveform span{animation:none;}
  }

  /* Widget stage: custom chrome around the ElevenLabs widget */
  .stage{
    position:relative;
    width:100%;
    max-width:360px;
    padding:28px 22px 24px;
    border-radius:20px;
    background:linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
    border:1px solid rgba(255,255,255,0.09);
    backdrop-filter:blur(6px);
  }
  .stage .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--slate);
    margin-bottom:28px;
  }
  .widget-wrap{
    display:flex;
    justify-content:center;
    min-height:220px;
    align-items:center;
  }

  footer{
    width:100%;
    max-width:880px;
    padding:24px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.04em;
    color:#565B65;
    z-index:1;
  }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot"></span> Aria</div>
  <div class="eyebrow">Live Demo</div>
</header>

<main>
  <div class="waveform">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <h1>Talk to <em>Aria</em>,<br>anytime.</h1>
  <p class="lede">
    Your always-on voice concierge — answers questions, handles requests,
    and sounds like it belongs on your team. Tap below and start talking.
  </p>

  <div class="stage">
    <div class="label">Tap to start a conversation</div>
    <div class="widget-wrap">
      <elevenlabs-convai
        agent-id="agent_9901kx5mc3xyf398k0h057q4fgnk"
        branch-id="agtbrch_0101kx5mc5jmetvrgt99ygc55djf"
        variant="full"
        avatar-orb-color-1="#E8A33D"
        avatar-orb-color-2="#1F3A3D"
        action-text="Talk to Aria"
        start-call-text="Start conversation"
        listening-text="Listening…"
        speaking-text="Aria is speaking…"
      ></elevenlabs-convai>
    </div>
  </div>
</main>

<footer>
  Aria Voice — Demo Environment
</footer>

<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

</body>
</html>
